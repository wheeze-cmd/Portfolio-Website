<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="css/styles.css" rel ="stylesheet">
<link rel="icon" type="image/png" href="favicon.png">
<title>Louis Miguel Terrago</title>
</head>
<body>
    <header>
        <div class="logo">
            <img src="favicon.png" alt="Louis Miguel">
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="https://github.com/wheeze-cmd" target="_blank">Works</a>
            <a class="hireBtn" href="https://www.linkedin.com/in/louis-miguel-terrago-07b4b33a9/" target="_blank">Hire Me!</a>
        </nav>
    </header>
    <main>
        <section id="contactpage" class="contact">
            <h2>Send a message</h2>
            <div class="contact-section">
                <form class="contact-form">
                    <div class="input">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" placeholder="Your name" class="input-field" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" placeholder="...@gmail.com" class="input-field" required>
                        </div>
                        <div class="form-group">
                            <label for="comp">Company Name</label>
                            <input type="text" id="comp" placeholder="A Company.inc" class="input-field">
                        </div>
                        <div class="form-group">
                            <label for="tel">Contact Number</label>
                            <input type="telephone" id="tel" placeholder="+63 / 02 123 4567 " class="input-field" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="msg">Send a message</label>
                        <textarea  placeholder="Greetings, Mr. Louis..." class="message-field"></textarea>
                    </div>
                    
                    <button type="submit" class="send-button">Deliver Message</button>
                </form>
                <div class="contact-links">
                    <h2>Contact Information</h2>
                    
                    <h5>Facebook</h5>
                    <p>Louis</p>
                    <h5>Mail</h5>
                    <p>louismiguelterrago@gmail.com</p>
                    <h5>Tel</h5>
                    <p>+63 961 743 2487</p>
                </div>
            </div>
        </section>
        <footer>
            <h5>©Louis Miguel Terrago 2026. All Rights Reserved.</h5>
        </footer>
    </main>
</body>
</html>
